<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarqo.tech - AI Agency</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-info {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            color: #ffffff;
            font-size: 12px;
            letter-spacing: 2px;
            opacity: 0.6;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .ui-info {
                font-size: 10px;
                bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="ui-info">AARQO.TECH • AI SOLUTIONS</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
        // ===== SCENE SETUP =====
        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.Fog(0x000000, 30, 80);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.2, 7);
        camera.lookAt(0, 0.5, 0);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFShadowShadowMap;
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        // ===== LIGHTING SETUP =====
        const keyLight = new THREE.DirectionalLight(0xffffff, 2);
        keyLight.position.set(8, 6, 8);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.width = 2048;
        keyLight.shadow.mapSize.height = 2048;
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0xffffff, 0.8);
        fillLight.position.set(-8, 4, 5);
        scene.add(fillLight);

        const rimLight = new THREE.PointLight(0xffffff, 1.5, 30);
        rimLight.position.set(0, 3, -8);
        scene.add(rimLight);

        const ambientLight = new THREE.AmbientLight(0x1a1a2e, 0.5);
        scene.add(ambientLight);

        // ===== FLOOR WITH REFLECTIONS =====
        const floorGeometry = new THREE.PlaneGeometry(50, 50);
        const floorMaterial = new THREE.MeshStandardMaterial({
            color: 0x0a0a0a,
            metalness: 0.6,
            roughness: 0.4,
            side: THREE.DoubleSide
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -1.5;
        floor.receiveShadow = true;
        scene.add(floor);

        // Neon floor reflections (grid)
        const gridHelper = new THREE.GridHelper(50, 50, 0x222222, 0x111111);
        gridHelper.position.y = -1.48;
        scene.add(gridHelper);

        // ===== GLOSSY WHITE ROBOT =====
        const robot = new THREE.Group();
        scene.add(robot);

        const robotMaterial = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            metalness: 0.9,
            roughness: 0.05,
            side: THREE.DoubleSide,
            emissive: 0x333333,
            emissiveIntensity: 0.1
        });

        const jointMaterial = new THREE.MeshStandardMaterial({
            color: 0x1a1a1a,
            metalness: 0.8,
            roughness: 0.3
        });

        // Head
        const headGeometry = new THREE.IcosahedronGeometry(0.35, 4);
        const head = new THREE.Mesh(headGeometry, robotMaterial);
        head.position.y = 1.3;
        head.castShadow = true;
        head.receiveShadow = true;
        robot.add(head);

        // Eyes (LED accents)
        const eyeGeometry = new THREE.SphereGeometry(0.08, 16, 16);
        const eyeMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const eyeLeft = new THREE.Mesh(eyeGeometry, eyeMaterial);
        eyeLeft.position.set(-0.12, 1.35, 0.3);
        robot.add(eyeLeft);

        const eyeRight = new THREE.Mesh(eyeGeometry, eyeMaterial);
        eyeRight.position.set(0.12, 1.35, 0.3);
        robot.add(eyeRight);

        // Chest
        const torsoGeometry = new THREE.BoxGeometry(0.4, 0.8, 0.3);
        const torso = new THREE.Mesh(torsoGeometry, robotMaterial);
        torso.position.y = 0.3;
        torso.castShadow = true;
        torso.receiveShadow = true;
        robot.add(torso);

        // Left Shoulder Joint
        const shoulderLeftJoint = new THREE.Mesh(
            new THREE.SphereGeometry(0.12, 8, 8),
            jointMaterial
        );
        shoulderLeftJoint.position.set(-0.25, 0.6, 0);
        robot.add(shoulderLeftJoint);

        // Right Shoulder Joint
        const shoulderRightJoint = new THREE.Mesh(
            new THREE.SphereGeometry(0.12, 8, 8),
            jointMaterial
        );
        shoulderRightJoint.position.set(0.25, 0.6, 0);
        robot.add(shoulderRightJoint);

        // Left Arm
        const leftArmGeometry = new THREE.BoxGeometry(0.12, 0.7, 0.12);
        const leftArm = new THREE.Mesh(leftArmGeometry, robotMaterial);
        leftArm.position.set(-0.25, -0.05, 0);
        leftArm.castShadow = true;
        leftArm.receiveShadow = true;
        robot.add(leftArm);

        // Right Arm (interactive)
        const rightArmGeometry = new THREE.BoxGeometry(0.12, 0.7, 0.12);
        const rightArm = new THREE.Mesh(rightArmGeometry, robotMaterial);
        rightArm.position.set(0.25, -0.05, 0);
        rightArm.castShadow = true;
        rightArm.receiveShadow = true;
        rightArm.userData.isRightArm = true;
        robot.add(rightArm);

        // Left Hand
        const leftHandGeometry = new THREE.BoxGeometry(0.1, 0.15, 0.1);
        const leftHand = new THREE.Mesh(leftHandGeometry, robotMaterial);
        leftHand.position.set(-0.25, -0.45, 0);
        leftHand.castShadow = true;
        robot.add(leftHand);

        // Right Hand (active)
        const rightHandGeometry = new THREE.BoxGeometry(0.1, 0.15, 0.1);
        const rightHand = new THREE.Mesh(rightHandGeometry, robotMaterial);
        rightHand.position.set(0.25, -0.45, 0);
        rightHand.castShadow = true;
        rightHand.userData.isRightHand = true;
        robot.add(rightHand);

        // Legs
        const legGeometry = new THREE.BoxGeometry(0.12, 0.6, 0.12);
        const leftLeg = new THREE.Mesh(legGeometry, robotMaterial);
        leftLeg.position.set(-0.12, -1, 0);
        leftLeg.castShadow = true;
        leftLeg.receiveShadow = true;
        robot.add(leftLeg);

        const rightLeg = new THREE.Mesh(legGeometry, robotMaterial);
        rightLeg.position.set(0.12, -1, 0);
        rightLeg.castShadow = true;
        rightLeg.receiveShadow = true;
        robot.add(rightLeg);

        // ===== UI CARDS CAROUSEL =====
        const cardSequence = ['AI Automation', 'Bots', 'AI Websites', 'UGC Ads'];
        const cardsGroup = new THREE.Group();
        scene.add(cardsGroup);

        const cards = [];
        let currentCardIndex = 0;

        function createCard(text, startX = 5) {
            const cardGroup = new THREE.Group();

            // Card plane with glassmorphism
            const cardGeometry = new THREE.PlaneGeometry(1.2, 0.6);
            const cardMaterial = new THREE.MeshStandardMaterial({
                color: 0x0a0a0a,
                metalness: 0.2,
                roughness: 0.8,
                transparent: true,
                opacity: 0.7,
                side: THREE.DoubleSide,
                emissive: 0x1a1a1a,
                emissiveIntensity: 0.2
            });
            const cardMesh = new THREE.Mesh(cardGeometry, cardMaterial);
            cardMesh.castShadow = true;
            cardMesh.receiveShadow = true;
            cardGroup.add(cardMesh);

            // Glowing white edge
            const edgeGeometry = new THREE.BufferGeometry();
            const positions = new Float32Array([
                -0.6, -0.3, 0.01,
                0.6, -0.3, 0.01,
                0.6, 0.3, 0.01,
                -0.6, 0.3, 0.01
            ]);
            edgeGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const lineMaterial = new THREE.LineBasicMaterial({
                color: 0xffffff,
                linewidth: 2,
                transparent: true,
                opacity: 0.8
            });
            const edges = new THREE.LineLoop(edgeGeometry, lineMaterial);
            edges.position.z = 0.02;
            cardGroup.add(edges);

            // Glow light
            const glowLight = new THREE.PointLight(0xffffff, 2, 10);
            glowLight.position.set(0, 0, 0.5);
            cardGroup.add(glowLight);

            cardGroup.position.x = startX;
            cardGroup.position.y = 0.5;
            cardGroup.userData = {
                text,
                glowLight,
                velocity: -0.4,
                originalOpacity: 0.7,
                isActive: true
            };

            cardsGroup.add(cardGroup);
            return cardGroup;
        }

        // Initialize first card
        let activeCard = createCard(cardSequence[0], 5);
        cards.push(activeCard);

        // ===== PARTICLE SYSTEM =====
        const particlesGeometry = new THREE.BufferGeometry();
        const particleCount = 200;
        const positions = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount * 3; i += 3) {
            positions[i] = (Math.random() - 0.5) * 20;
            positions[i + 1] = (Math.random() - 0.5) * 10;
            positions[i + 2] = (Math.random() - 0.5) * 20;

            velocities[i] = (Math.random() - 0.5) * 0.01;
            velocities[i + 1] = (Math.random() - 0.5) * 0.01;
            velocities[i + 2] = (Math.random() - 0.5) * 0.01;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const particlesMaterial = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.05,
            sizeAttenuation: true,
            transparent: true,
            opacity: 0.3
        });

        const particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);

        // ===== TECH LINES BACKGROUND =====
        function createTechLines() {
            const linesGroup = new THREE.Group();

            for (let i = 0; i < 8; i++) {
                const points = [];
                points.push(new THREE.Vector3(
                    (Math.random() - 0.5) * 30,
                    (Math.random() - 0.5) * 10,
                    -15
                ));
                points.push(new THREE.Vector3(
                    (Math.random() - 0.5) * 30,
                    (Math.random() - 0.5) * 10,
                    15
                ));

                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const material = new THREE.LineBasicMaterial({
                    color: 0x222222,
                    transparent: true,
                    opacity: 0.3
                });
                const line = new THREE.Line(geometry, material);
                linesGroup.add(line);
            }

            return linesGroup;
        }

        const techLines = createTechLines();
        scene.add(techLines);

        // ===== ANIMATION LOOP =====
        let time = 0;
        let cardSwipeTimer = 0;
        const CARD_SWIPE_INTERVAL = 3000; // 3 seconds between cards

        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            cardSwipeTimer += 16;

            // Robot breathing and subtle movement
            robot.position.y = 0 + Math.sin(time * 0.5) * 0.05;
            robot.rotation.y = Math.sin(time * 0.2) * 0.05;

            // Right arm reaching toward cards
            const rightArm = robot.children.find(c => c.userData.isRightArm);
            if (rightArm) {
                rightArm.rotation.z = Math.sin(time * 1.2) * 0.3;
            }

            const rightHand = robot.children.find(c => c.userData.isRightHand);
            if (rightHand) {
                rightHand.position.x = 0.25 + Math.sin(time * 1.5) * 0.2;
            }

            // Eye LED pulse
            const eyeLeft = robot.children.find((c, i) => i === 3);
            const eyeRight = robot.children.find((c, i) => i === 4);
            if (eyeLeft && eyeRight) {
                const pulse = 0.5 + Math.sin(time * 3) * 0.5;
                eyeLeft.material.color.setHSL(0, 0, pulse);
                eyeRight.material.color.setHSL(0, 0, pulse);
            }

            // Update particles
            const positionAttribute = particlesGeometry.getAttribute('position');
            const pos = positionAttribute.array;

            for (let i = 0; i < particleCount * 3; i += 3) {
                pos[i] += velocities[i];
                pos[i + 1] += velocities[i + 1];
                pos[i + 2] += velocities[i + 2];

                if (pos[i] > 10 || pos[i] < -10) velocities[i] *= -1;
                if (pos[i + 1] > 5 || pos[i + 1] < -5) velocities[i + 1] *= -1;
                if (pos[i + 2] > 10 || pos[i + 2] < -10) velocities[i + 2] *= -1;
            }
            positionAttribute.needsUpdate = true;

            // Animate cards
            cards.forEach((card, index) => {
                // Horizontal swipe motion
                card.position.x += card.userData.velocity;

                // Motion blur effect through opacity
                if (card.position.x < -8) {
                    card.position.x = 5;
                }

                // Floating motion
                card.position.y = 0.5 + Math.sin(time * 1 + index) * 0.1;

                // Rotation animation
                card.rotation.y = Math.sin(time * 0.5 + index * 0.5) * 0.2;

                // Glow pulsing
                const glowIntensity = 1.5 + Math.sin(time * 2 + index) * 0.8;
                card.userData.glowLight.intensity = glowIntensity;

                // Opacity breathing
                const cardMesh = card.children[0];
                cardMesh.material.opacity = 0.5 + Math.sin(time * 1.5 + index) * 0.25;
            });

            // Auto-generate new cards in sequence
            if (cardSwipeTimer > CARD_SWIPE_INTERVAL) {
                currentCardIndex = (currentCardIndex + 1) % cardSequence.length;
                const newCard = createCard(cardSequence[currentCardIndex], 5);
                cards.push(newCard);

                // Remove old cards that are off-screen
                if (cards.length > 4) {
                    const oldCard = cards.shift();
                    cardsGroup.remove(oldCard);
                }

                cardSwipeTimer = 0;
            }

            renderer.render(scene, camera);
        }

        animate();

        // ===== RESPONSIVE HANDLING =====
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;

            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);

            if (width < 768) {
                camera.position.z = 9;
                robot.scale.set(0.8, 0.8, 0.8);
            } else {
                camera.position.z = 7;
                robot.scale.set(1, 1, 1);
            }
        });

        // Mobile check on load
        if (window.innerWidth < 768) {
            camera.position.z = 9;
            robot.scale.set(0.8, 0.8, 0.8);
        }
    </script>
</body>
</html>
