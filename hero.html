<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarqo.tech - Hero Section</title>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #1a1410;
            --accent-orange: #FF7A00;
            --text-primary: #F5F0E8;
            --ff-heading: 'Syne', sans-serif;
            --ff-body: 'Rajdhani', sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: var(--ff-body);
            background: var(--bg-dark);
            overflow: hidden;
        }

        /* Custom Cursor */
        body {
            cursor: none;
        }

        .custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent-orange);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: screen;
            transition: all 0.1s ease;
        }

        .custom-cursor.active {
            width: 40px;
            height: 40px;
            border-width: 3px;
            box-shadow: 0 0 20px rgba(255, 122, 0, 0.6);
        }

        /* Three.js Canvas */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
        }

        /* Hero Container */
        .hero {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
            color: var(--text-primary);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Typewriter Text */
        .typewriter-container {
            height: 40px;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .typewriter {
            font-family: var(--ff-body);
            font-size: clamp(0.9rem, 2.5vw, 1.3rem);
            color: var(--accent-orange);
            font-weight: 600;
            min-width: 200px;
            text-align: center;
            letter-spacing: 1px;
        }

        .typewriter::after {
            content: '|';
            animation: blink 0.8s infinite;
            margin-left: 3px;
        }

        @keyframes blink {
            0%, 49% {
                opacity: 1;
            }
            50%, 100% {
                opacity: 0;
            }
        }

        /* Main Headline */
        .hero h1 {
            font-family: var(--ff-heading);
            font-size: clamp(2.5rem, 10vw, 5rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            letter-spacing: -1px;
        }

        .headline-white {
            color: var(--text-primary);
            display: block;
        }

        .headline-outline {
            display: block;
            background: linear-gradient(90deg, var(--accent-orange), #FFB347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            position: relative;
        }

        .headline-outline::before {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            z-index: -1;
            -webkit-text-fill-color: unset;
            color: transparent;
            -webkit-text-stroke: 2px var(--accent-orange);
            background: linear-gradient(90deg, var(--accent-orange), #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
        }

        /* Subheading */
        .hero-subtitle {
            font-size: clamp(0.95rem, 2vw, 1.15rem);
            color: #C5BDB5;
            max-width: 600px;
            margin: 2rem auto 3rem;
            line-height: 1.8;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        /* CTA Buttons */
        .cta-container {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .cta-button {
            padding: 1rem 2.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: 2px solid var(--accent-orange);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-family: var(--ff-body);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .cta-button-primary {
            background: var(--accent-orange);
            color: var(--bg-dark);
        }

        .cta-button-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s ease;
        }

        .cta-button-primary:hover::before {
            left: 100%;
        }

        .cta-button-primary:hover {
            background: transparent;
            color: var(--accent-orange);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 122, 0, 0.3);
        }

        .cta-button-secondary {
            background: transparent;
            color: var(--accent-orange);
        }

        .cta-button-secondary:hover {
            background: var(--accent-orange);
            color: var(--bg-dark);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 122, 0, 0.3);
        }

        /* Scroll Indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
        }

        .mouse {
            width: 26px;
            height: 40px;
            border: 2px solid var(--accent-orange);
            border-radius: 13px;
            display: flex;
            justify-content: center;
            padding-top: 8px;
            margin: 0 auto;
        }

        .wheel {
            width: 4px;
            height: 8px;
            background: var(--accent-orange);
            border-radius: 2px;
            animation: scrollWheel 1.5s ease-in-out infinite;
        }

        @keyframes scrollWheel {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(10px);
            }
        }

        .scroll-text {
            font-size: 0.8rem;
            color: var(--accent-orange);
            margin-top: 8px;
            text-align: center;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        /* Entrance Animation */
        @keyframes fadeUpIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-content > * {
            animation: fadeUpIn 0.8s ease forwards;
        }

        .typewriter-container {
            animation-delay: 0.2s;
        }

        .hero h1 {
            animation-delay: 0.4s;
        }

        .hero-subtitle {
            animation-delay: 0.6s;
        }

        .cta-container {
            animation-delay: 0.8s;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero {
                min-height: 100vh;
                padding: 2rem 1rem;
            }

            .hero h1 {
                font-size: clamp(1.8rem, 8vw, 3rem);
            }

            .typewriter {
                font-size: clamp(0.85rem, 2vw, 1.1rem);
            }

            .hero-subtitle {
                font-size: clamp(0.85rem, 1.8vw, 1rem);
                padding: 0 1rem;
            }

            .cta-container {
                flex-direction: column;
                gap: 1rem;
            }

            .cta-button {
                width: 100%;
                max-width: 300px;
            }

            .scroll-indicator {
                bottom: 20px;
            }
        }

        /* Glow Effect Background */
        .glow-orb {
            position: fixed;
            z-index: 0;
            pointer-events: none;
        }

        .glow-orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 122, 0, 0.1) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            animation: float1 20s ease-in-out infinite;
        }

        .glow-orb-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 122, 0, 0.05) 0%, transparent 70%);
            bottom: 0;
            left: -100px;
            animation: float2 25s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 50px); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-50px, -50px); }
        }
    </style>
</head>
<body>
    <!-- Glow Orbs -->
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <!-- Three.js Canvas -->
    <canvas id="particleCanvas"></canvas>

    <!-- Custom Cursor -->
    <div class="custom-cursor"></div>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <!-- Typewriter -->
            <div class="typewriter-container">
                <span class="typewriter" id="typewriter">AI Websites</span>
            </div>

            <!-- Main Headline -->
            <h1>
                <span class="headline-white">We Build Businesses</span>
                <span class="headline-outline" data-text="With AI">With AI</span>
            </h1>

            <!-- Subheading -->
            <p class="hero-subtitle">
                From stunning websites to intelligent automation — Aarqo.tech is your AI-powered growth partner
            </p>

            <!-- CTA Buttons -->
            <div class="cta-container">
                <button class="cta-button cta-button-primary">See Our Work</button>
                <button class="cta-button cta-button-secondary">Book Free Call</button>
            </div>
        </div>

        <!-- Scroll Indicator -->
        <div class="scroll-indicator">
            <div class="mouse">
                <div class="wheel"></div>
            </div>
            <div class="scroll-text">Scroll</div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // ===== CUSTOM CURSOR =====
        const cursor = document.querySelector('.custom-cursor');
        let mouseX = 0;
        let mouseY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursor.style.left = (mouseX - 10) + 'px';
            cursor.style.top = (mouseY - 10) + 'px';
        });

        // Add active state on buttons
        document.querySelectorAll('.cta-button').forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                cursor.classList.add('active');
            });
            btn.addEventListener('mouseleave', () => {
                cursor.classList.remove('active');
            });
        });

        // Hide cursor when leaving window
        document.addEventListener('mouseleave', () => {
            cursor.style.opacity = '0';
        });

        document.addEventListener('mouseenter', () => {
            cursor.style.opacity = '1';
        });

        // ===== TYPEWRITER ANIMATION =====
        const phrases = ['AI Websites', 'Smart Bots', 'Automation', 'UGC Ads', 'More...'];
        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const typewriterElement = document.getElementById('typewriter');

        function typeWriter() {
            const currentPhrase = phrases[phraseIndex];

            if (isDeleting) {
                charIndex--;
            } else {
                charIndex++;
            }

            typewriterElement.textContent = currentPhrase.substring(0, charIndex);

            let speed = isDeleting ? 50 : 100;

            if (!isDeleting && charIndex === currentPhrase.length) {
                speed = 1500;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                phraseIndex = (phraseIndex + 1) % phrases.length;
                speed = 500;
            }

            setTimeout(typeWriter, speed);
        }

        typeWriter();

        // ===== THREE.JS PARTICLE NETWORK =====
        function initParticles() {
            const canvas = document.getElementById('particleCanvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });

            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);
            renderer.setPixelRatio(window.devicePixelRatio);
            camera.position.z = 50;

            // Particle geometry
            const particleCount = 100;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const velocities = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 100;
                positions[i + 1] = (Math.random() - 0.5) * 100;
                positions[i + 2] = (Math.random() - 0.5) * 100;

                velocities[i] = (Math.random() - 0.5) * 0.2;
                velocities[i + 1] = (Math.random() - 0.5) * 0.2;
                velocities[i + 2] = (Math.random() - 0.5) * 0.2;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                color: 0xFF7A00,
                size: 0.5,
                sizeAttenuation: true,
                opacity: 0.7,
                transparent: true
            });

            const particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // Store for animation
            const positionAttribute = geometry.getAttribute('position');

            // Lines geometry for connections
            const lineGeometry = new THREE.BufferGeometry();
            const lineMaterial = new THREE.LineBasicMaterial({
                color: 0xFF7A00,
                opacity: 0.2,
                transparent: true,
                linewidth: 1
            });

            // Animation loop
            const animate = () => {
                requestAnimationFrame(animate);

                const posArray = positionAttribute.array;

                // Update particle positions
                for (let i = 0; i < particleCount * 3; i += 3) {
                    posArray[i] += velocities[i];
                    posArray[i + 1] += velocities[i + 1];
                    posArray[i + 2] += velocities[i + 2];

                    // Bounce off boundaries
                    if (posArray[i] > 50 || posArray[i] < -50) velocities[i] *= -1;
                    if (posArray[i + 1] > 50 || posArray[i + 1] < -50) velocities[i + 1] *= -1;
                    if (posArray[i + 2] > 50 || posArray[i + 2] < -50) velocities[i + 2] *= -1;
                }

                positionAttribute.needsUpdate = true;
                particles.rotation.x += 0.0001;
                particles.rotation.y += 0.0002;

                // Draw connecting lines
                const lines = [];
                const maxDistance = 15;

                for (let i = 0; i < particleCount; i++) {
                    for (let j = i + 1; j < particleCount; j++) {
                        const dx = posArray[i * 3] - posArray[j * 3];
                        const dy = posArray[i * 3 + 1] - posArray[j * 3 + 1];
                        const dz = posArray[i * 3 + 2] - posArray[j * 3 + 2];
                        const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);

                        if (distance < maxDistance) {
                            lines.push(
                                posArray[i * 3], posArray[i * 3 + 1], posArray[i * 3 + 2],
                                posArray[j * 3], posArray[j * 3 + 1], posArray[j * 3 + 2]
                            );
                        }
                    }
                }

                // Update lines
                if (lines.length > 0) {
                    lineGeometry.dispose();
                    lineGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(lines), 3));
                }

                renderer.render(scene, camera);
            };

            animate();

            // Handle resize
            window.addEventListener('resize', () => {
                const width = window.innerWidth;
                const height = window.innerHeight;
                camera.aspect = width / height;
                camera.updateProjectionMatrix();
                renderer.setSize(width, height);
            });
        }

        initParticles();

        // ===== BUTTON INTERACTIONS =====
        const buttons = document.querySelectorAll('.cta-button');
        buttons.forEach(button => {
            button.addEventListener('click', function() {
                const ripple = document.createElement('span');
                ripple.style.position = 'absolute';
                ripple.style.width = '20px';
                ripple.style.height = '20px';
                ripple.style.background = 'rgba(255, 122, 0, 0.5)';
                ripple.style.borderRadius = '50%';
                ripple.style.pointerEvents = 'none';
                ripple.style.animation = 'rippleEffect 0.6s ease-out';

                const rect = this.getBoundingClientRect();
                ripple.style.left = '50%';
                ripple.style.top = '50%';
                ripple.style.transform = 'translate(-50%, -50%)';

                this.appendChild(ripple);

                setTimeout(() => ripple.remove(), 600);
            });
        });

        // Ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes rippleEffect {
                0% {
                    width: 20px;
                    height: 20px;
                    opacity: 1;
                }
                100% {
                    width: 300px;
                    height: 300px;
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Scroll page down on scroll indicator click
        document.querySelector('.scroll-indicator').addEventListener('click', () => {
            window.scrollBy({ top: window.innerHeight, behavior: 'smooth' });
        });
    </script>
</body>
</html>
