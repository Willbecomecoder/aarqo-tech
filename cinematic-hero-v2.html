<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarqo Tech - AI Business Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Syne', sans-serif;
            background: #060608;
            color: #F0EBE3;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hero-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
            padding: 40px 80px;
        }

        .hero-left {
            flex: 1;
            z-index: 20;
        }

        .hero-left h1 {
            font-size: 72px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        .hero-left h1 .we-build {
            color: #F0EBE3;
            display: block;
        }

        .hero-left h1 .businesses {
            display: block;
            -webkit-text-fill: transparent;
            -webkit-text-stroke: 2px #FF6B00;
            text-stroke: 2px #FF6B00;
            color: transparent;
        }

        .hero-left h1 .with-ai {
            color: #F0EBE3;
            display: block;
        }

        .hero-description {
            font-size: 18px;
            color: #999999;
            margin-bottom: 40px;
            line-height: 1.6;
            max-width: 500px;
        }

        .hero-cta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #FF6B00;
            color: #060608;
        }

        .btn-primary:hover {
            background: #ff7f1f;
            box-shadow: 0 0 30px rgba(255, 107, 0, 0.5);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #FF6B00;
            color: #FF6B00;
        }

        .btn-secondary:hover {
            background: rgba(255, 107, 0, 0.1);
            box-shadow: 0 0 20px rgba(255, 107, 0, 0.3);
        }

        .hero-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            height: 100%;
            z-index: 15;
        }

        .scene-container {
            position: relative;
            width: 600px;
            height: 600px;
        }

        .robot-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 30;
        }

        .podium {
            position: absolute;
            width: 250px;
            height: 80px;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            filter: drop-shadow(0 0 40px rgba(255, 107, 0, 0.4)) drop-shadow(0 0 80px rgba(255, 107, 0, 0.2));
            animation: podiumPulse 3s ease-in-out infinite;
        }

        @keyframes podiumPulse {
            0%, 100% { filter: drop-shadow(0 0 40px rgba(255, 107, 0, 0.4)) drop-shadow(0 0 80px rgba(255, 107, 0, 0.2)); }
            50% { filter: drop-shadow(0 0 50px rgba(255, 107, 0, 0.6)) drop-shadow(0 0 100px rgba(255, 107, 0, 0.3)); }
        }

        .robot-body {
            position: relative;
            width: 120px;
            height: 160px;
            animation: robotBreathe 3s ease-in-out infinite;
        }

        @keyframes robotBreathe {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.05); }
        }

        .robot-head {
            position: absolute;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 50%, #f5f5f5 100%);
            border-radius: 50% 50% 40% 40%;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.3), 0 0 30px rgba(255, 107, 0, 0.3);
        }

        .antenna {
            position: absolute;
            width: 4px;
            height: 50px;
            background: linear-gradient(180deg, #FF6B00 0%, #FFB347 100%);
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 2px;
            box-shadow: 0 0 15px rgba(255, 107, 0, 0.6);
            animation: antennaBlink 1s ease-in-out infinite;
        }

        @keyframes antennaBlink {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 107, 0, 0.6); opacity: 1; }
            50% { box-shadow: 0 0 25px rgba(255, 107, 0, 1); opacity: 0.8; }
        }

        .eyes {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }

        .eye {
            width: 16px;
            height: 16px;
            background: #00FFFF;
            border-radius: 50%;
            box-shadow: 0 0 15px #00FFFF, inset 0 0 10px rgba(0, 255, 255, 0.5);
            animation: eyeBlink 2s ease-in-out infinite;
        }

        .eye:nth-child(2) {
            animation-delay: 0.1s;
        }

        @keyframes eyeBlink {
            0%, 10%, 20%, 100% { 
                height: 16px;
                box-shadow: 0 0 15px #00FFFF, inset 0 0 10px rgba(0, 255, 255, 0.5);
            }
            5%, 15% { 
                height: 3px;
                box-shadow: 0 0 8px #00FFFF;
            }
        }

        .torso {
            position: absolute;
            width: 80px;
            height: 70px;
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 50%, #e8e8e8 100%);
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 10px;
            box-shadow: inset -3px -3px 10px rgba(0,0,0,0.2), 0 0 20px rgba(255, 107, 0, 0.2);
        }

        .torso::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 107, 0, 0.3) 50%, transparent 100%);
            border-radius: 10px;
        }

        .arm-left {
            position: absolute;
            width: 50px;
            height: 20px;
            background: linear-gradient(180deg, #ffffff 0%, #e0e0e0 100%);
            top: 80px;
            left: 15px;
            border-radius: 10px;
            transform-origin: right center;
            box-shadow: 0 0 15px rgba(255, 107, 0, 0.2);
            animation: armIdle 2s ease-in-out infinite;
        }

        .arm-right {
            position: absolute;
            width: 50px;
            height: 20px;
            background: linear-gradient(180deg, #ffffff 0%, #e0e0e0 100%);
            top: 80px;
            right: 15px;
            border-radius: 10px;
            transform-origin: left center;
            box-shadow: 0 0 15px rgba(255, 107, 0, 0.2);
        }

        @keyframes armIdle {
            0%, 100% { transform: rotateZ(0deg); }
            50% { transform: rotateZ(-10deg); }
        }

        .arm-right.extending {
            animation: armExtend 0.8s ease-in-out forwards;
        }

        .arm-right.retracting {
            animation: armRetract 0.8s ease-in-out forwards;
        }

        @keyframes armExtend {
            0% { transform: rotateZ(0deg) translateX(0); }
            50% { transform: rotateZ(45deg) translateX(20px); }
            100% { transform: rotateZ(45deg) translateX(60px); }
        }

        @keyframes armRetract {
            0% { transform: rotateZ(45deg) translateX(60px); }
            100% { transform: rotateZ(0deg) translateX(0); }
        }

        .legs {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }

        .leg {
            width: 12px;
            height: 30px;
            background: linear-gradient(180deg, #ffffff 0%, #d0d0d0 100%);
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(255, 107, 0, 0.15);
        }

        .floating-boxes-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .floating-box {
            position: absolute;
            width: 140px;
            height: 100px;
            background: rgba(255, 107, 0, 0.04);
            border: 1px solid rgba(255, 107, 0, 0.3);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255, 107, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            padding: 15px;
            color: #FF6B00;
            opacity: 0;
            animation: boxFadeIn 0.5s ease forwards;
        }

        @keyframes boxFadeIn {
            to { opacity: 1; }
        }

        .floating-box.active {
            background: rgba(255, 107, 0, 0.15);
            border: 2px solid rgba(255, 107, 0, 0.8);
            box-shadow: 0 0 40px rgba(255, 107, 0, 0.6), inset 0 0 20px rgba(255, 107, 0, 0.2);
            color: #FF6B00;
        }

        .floating-box.active .box-text {
            animation: typewriter 1.5s steps(20) forwards;
        }

        @keyframes typewriter {
            from {
                width: 0;
                opacity: 0;
            }
            to {
                width: 100%;
                opacity: 1;
            }
        }

        .box-text {
            width: 0;
            overflow: hidden;
            white-space: nowrap;
            font-weight: 700;
            color: inherit;
        }

        .box-1 { top: 30px; right: 80px; animation: float1 4s ease-in-out infinite; }
        .box-2 { top: 180px; right: -20px; animation: float2 5s ease-in-out infinite; }
        .box-3 { bottom: 120px; right: 60px; animation: float3 4.5s ease-in-out infinite; }
        .box-4 { bottom: 80px; left: 60px; animation: float4 5.5s ease-in-out infinite; }
        .box-5 { top: 150px; left: -40px; animation: float5 4.2s ease-in-out infinite; }

        @keyframes float1 {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes float2 {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(15px); }
        }

        @keyframes float3 {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-25px); }
        }

        @keyframes float4 {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(20px); }
        }

        @keyframes float5 {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .glow-bg {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 107, 0, 0.15) 0%, rgba(255, 107, 0, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: blur(80px);
            pointer-events: none;
            z-index: 5;
        }

        @media (max-width: 1200px) {
            .hero-container {
                flex-direction: column;
                padding: 40px;
            }

            .hero-left {
                margin-bottom: 40px;
            }

            .hero-left h1 {
                font-size: 48px;
            }

            .hero-right {
                height: auto;
            }

            .scene-container {
                width: 400px;
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="hero-container">
        <div class="hero-left">
            <h1>
                <span class="we-build">We Build</span>
                <span class="businesses">Businesses</span>
                <span class="with-ai">With AI</span>
            </h1>
            <p class="hero-description">
                Harness the power of artificial intelligence to automate your business, create engaging UGC ads, build stunning websites, deploy intelligent bots, and run smarter advertising campaigns.
            </p>
            <div class="hero-cta">
                <button class="btn btn-primary">Get Started</button>
                <button class="btn btn-secondary">Learn More</button>
            </div>
        </div>

        <div class="hero-right">
            <div class="glow-bg"></div>
            <div class="scene-container">
                <div class="podium"></div>
                <div class="floating-boxes-container" id="boxesContainer">
                    <div class="floating-box box-1" data-index="0">
                        <span class="box-text">AI Automation</span>
                    </div>
                    <div class="floating-box box-2" data-index="1">
                        <span class="box-text">AI UGC Ads</span>
                    </div>
                    <div class="floating-box box-3" data-index="2">
                        <span class="box-text">AI Websites</span>
                    </div>
                    <div class="floating-box box-4" data-index="3">
                        <span class="box-text">AI Bots</span>
                    </div>
                    <div class="floating-box box-5" data-index="4">
                        <span class="box-text">AI Ads</span>
                    </div>
                </div>
                <div class="robot-container">
                    <div class="robot-body">
                        <div class="robot-head">
                            <div class="antenna"></div>
                            <div class="eyes">
                                <div class="eye"></div>
                                <div class="eye"></div>
                            </div>
                        </div>
                        <div class="torso"></div>
                        <div class="arm-left"></div>
                        <div class="arm-right" id="armRight"></div>
                        <div class="legs">
                            <div class="leg"></div>
                            <div class="leg"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Three.js Particle Network Background
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x060608, 1);
        container.appendChild(renderer.domElement);

        camera.position.z = 100;

        // Create particle network
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesMaterial = new THREE.PointsMaterial({ color: 0xFF6B00, size: 1.5 });

        const particlesCount = 150;
        const posArray = new Float32Array(particlesCount * 3);

        for (let i = 0; i < particlesCount * 3; i += 3) {
            posArray[i] = (Math.random() - 0.5) * 300;
            posArray[i + 1] = (Math.random() - 0.5) * 300;
            posArray[i + 2] = (Math.random() - 0.5) * 300;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // Create lines between nearby particles
        const linesMaterial = new THREE.LineBasicMaterial({ color: 0xFF6B00, transparent: true, opacity: 0.2 });
        const linesGeometry = new THREE.BufferGeometry();
        const linePositions = [];

        const positions = particlesGeometry.attributes.position.array;
        for (let i = 0; i < particlesCount; i++) {
            for (let j = i + 1; j < particlesCount; j++) {
                const dx = positions[i * 3] - positions[j * 3];
                const dy = positions[i * 3 + 1] - positions[j * 3 + 1];
                const dz = positions[i * 3 + 2] - positions[j * 3 + 2];
                const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);

                if (distance < 50) {
                    linePositions.push(positions[i * 3], positions[i * 3 + 1], positions[i * 3 + 2]);
                    linePositions.push(positions[j * 3], positions[j * 3 + 1], positions[j * 3 + 2]);
                }
            }
        }

        linesGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(linePositions), 3));
        const linesMesh = new THREE.LineSegments(linesGeometry, linesMaterial);
        scene.add(linesMesh);

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            particlesMesh.rotation.x += 0.0001;
            particlesMesh.rotation.y += 0.0002;
            linesMesh.rotation.x += 0.0001;
            linesMesh.rotation.y += 0.0002;
            renderer.render(scene, camera);
        }

        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Robot Animation Logic
        const armRight = document.getElementById('armRight');
        const boxes = document.querySelectorAll('.floating-box');
        let currentBoxIndex = 0;
        let animationTimeout;

        function activateBox(boxElement, index) {
            // Remove active state from all boxes
            boxes.forEach(box => box.classList.remove('active'));
            
            // Activate current box
            boxElement.classList.add('active');

            // Dim after 1.5s
            setTimeout(() => {
                boxElement.classList.remove('active');
            }, 1500);
        }

        function robotReachSequence() {
            armRight.classList.remove('extending', 'retracting');
            void armRight.offsetWidth; // Trigger reflow
            
            armRight.classList.add('extending');
            
            setTimeout(() => {
                activateBox(boxes[currentBoxIndex], currentBoxIndex);
                
                setTimeout(() => {
                    armRight.classList.remove('extending');
                    armRight.classList.add('retracting');
                    
                    setTimeout(() => {
                        armRight.classList.remove('retracting');
                        currentBoxIndex = (currentBoxIndex + 1) % boxes.length;
                        
                        animationTimeout = setTimeout(robotReachSequence, 2500);
                    }, 800);
                }, 1500);
            }, 800);
        }

        // Start robot animation
        animationTimeout = setTimeout(robotReachSequence, 2500);

        // Box click/touch handler
        boxes.forEach((box, index) => {
            box.addEventListener('click', () => {
                clearTimeout(animationTimeout);
                currentBoxIndex = index;
                robotReachSequence();
            });

            box.addEventListener('touchstart', (e) => {
                e.preventDefault();
                clearTimeout(animationTimeout);
                currentBoxIndex = index;
                robotReachSequence();
            });
        });
    </script>
</body>
</html>
